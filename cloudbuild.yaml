timeout: '5400s'

options:
  logging: GCS_ONLY
logsBucket: 'gs://$PROJECT_ID-tfstate/build-logs'

steps:
  # ------------------------------------------------------------------
  # STAGE 0: Prepare Terraform Binary
  # ------------------------------------------------------------------
  - name: 'gcr.io/google.com/cloudsdktool/google-cloud-cli:latest'
    id: 'install-terraform'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        apt-get update && apt-get install -y unzip
        curl -sS https://releases.hashicorp.com/terraform/1.9.5/terraform_1.9.5_linux_amd64.zip -o terraform.zip
        unzip -o terraform.zip
        mv terraform /workspace/terraform
        chmod +x /workspace/terraform

  # ------------------------------------------------------------------
  # STAGE 1: Verify Apigee Base Infrastructure
  # ------------------------------------------------------------------
  - name: 'gcr.io/google.com/cloudsdktool/google-cloud-cli:latest'
    id: 'init-apigee-base'
    dir: 'tf/apigee'
    entrypoint: 'bash'
    env:
      - 'GOOGLE_PROJECT=$PROJECT_ID'
      - 'GOOGLE_CLOUD_PROJECT=$PROJECT_ID'
    args:
      - '-c'
      - '/workspace/terraform init -backend-config="bucket=${PROJECT_ID}-tfstate"'

  - name: 'gcr.io/google.com/cloudsdktool/google-cloud-cli:latest'
    id: 'apply-apigee-base'
    dir: 'tf/apigee'
    entrypoint: 'bash'
    env:
      - 'GOOGLE_PROJECT=$PROJECT_ID'
      - 'GOOGLE_CLOUD_PROJECT=$PROJECT_ID'
    args:
      - '-c'
      - |
        /workspace/terraform apply -auto-approve \
          -var="project_id=${PROJECT_ID}" \
          -var="region=us-central1"

  # ------------------------------------------------------------------
  # STAGE 2: Deploy Gemini & Claude AI Proxies via Apigee Templater
  # ------------------------------------------------------------------
  - name: 'gcr.io/google.com/cloudsdktool/google-cloud-cli:latest'
    id: 'deploy-ai-proxies'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        # Ensure jq is installed to parse API responses
        apt-get update && apt-get install -y nodejs npm jq
        npm install -g apigee-templater
        
        # Use your highly-restricted runtime service account!
        export APIGEE_SA="apigee-runtime@${PROJECT_ID}.iam.gserviceaccount.com"
        export TOKEN=$(gcloud auth print-access-token)
        
        echo "====================================="
        echo "Deploying Gemini AI Proxy"
        echo "====================================="
        # 1. Generate the Zip Bundle Locally
        script -q -e -c "aft -i ./templates/AI-Proxy-Gemini.yaml \
          -o ./AI-Gemini.zip \
          -p 'ModelBasePath=/gemini'" /dev/null
          
        # 2. Import the Bundle to Apigee
        echo "Importing Gemini Bundle to Apigee..."
        GEMINI_RES=$(curl -s -X POST "https://apigee.googleapis.com/v1/organizations/${PROJECT_ID}/apis?action=import&name=AI-Gemini" \
          -H "Authorization: Bearer $${TOKEN}" \
          -F "file=@./AI-Gemini.zip")
          
        REV_GEMINI=$(echo "$${GEMINI_RES}" | jq -r .revision)
        
        # 3. Deploy the Revision with the Service Account attached
        echo "Deploying Gemini Revision $${REV_GEMINI} with SA..."
        DEPLOY_GEM=$(curl -s -X POST "https://apigee.googleapis.com/v1/organizations/${PROJECT_ID}/environments/dev/apis/AI-Gemini/revisions/$${REV_GEMINI}/deployments?serviceAccount=$${APIGEE_SA}" \
          -H "Authorization: Bearer $${TOKEN}")
        
        echo "$${DEPLOY_GEM}"
        if echo "$${DEPLOY_GEM}" | grep -q '"error"'; then exit 1; fi

        echo "====================================="
        echo "Deploying Claude AI Proxy"
        echo "====================================="
        # 1. Generate the Zip Bundle Locally
        script -q -e -c "aft -i ./templates/AI-Proxy-Claude.yaml \
          -o ./AI-Claude.zip \
          -p 'ModelBasePath=/claude'" /dev/null
          
        # 2. Import the Bundle to Apigee
        echo "Importing Claude Bundle to Apigee..."
        CLAUDE_RES=$(curl -s -X POST "https://apigee.googleapis.com/v1/organizations/${PROJECT_ID}/apis?action=import&name=AI-Claude" \
          -H "Authorization: Bearer $${TOKEN}" \
          -F "file=@./AI-Claude.zip")
          
        REV_CLAUDE=$(echo "$${CLAUDE_RES}" | jq -r .revision)
        
        # 3. Deploy the Revision with the Service Account attached
        echo "Deploying Claude Revision $${REV_CLAUDE} with SA..."
        DEPLOY_CLA=$(curl -s -X POST "https://apigee.googleapis.com/v1/organizations/${PROJECT_ID}/environments/dev/apis/AI-Claude/revisions/$${REV_CLAUDE}/deployments?serviceAccount=$${APIGEE_SA}" \
          -H "Authorization: Bearer $${TOKEN}")
          
        echo "$${DEPLOY_CLA}"
        if echo "$${DEPLOY_CLA}" | grep -q '"error"'; then exit 1; fi




  # ------------------------------------------------------------------
  # STAGE 3: Register API Products, Developer App, & API Key
  # ------------------------------------------------------------------
  - name: 'gcr.io/google.com/cloudsdktool/google-cloud-cli:latest'
    id: 'register-api-key'
    entrypoint: 'bash'
    env:
      - 'GOOGLE_CLOUD_PROJECT=$PROJECT_ID'
      - 'APIGEE_ENVIRONMENT=dev'
    args:
      - '-c'
      - |
        set -e
        apt-get update && apt-get install -y jq
        chmod +x ./sh/register_key.sh
        source ./sh/register_key.sh
